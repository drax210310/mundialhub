spring.application.name=Mundial2026
server.port=8081

# =====================================
# DATABASE
# =====================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mundialhub}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:David210310}
spring.datasource.driver-class-name=org.postgresql.Driver

# =====================================
# JPA / HIBERNATE
# =====================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =====================================
# LOGS
# =====================================
# logging.file.name=logs/mundial-hub.log
# logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n
# logging.level.com.mundial.hub=INFO

# =====================================
# FLYWAY
# =====================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.out-of-order=true
spring.flyway.fail-on-missing-locations=true