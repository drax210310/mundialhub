<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login - Mundial HUB</title>

<!-- Bootstrap -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">

<!-- Estilos -->
<style>
body {
	background: linear-gradient(135deg, #0d6efd, #6610f2);
	height: 100vh;
	display: flex;
	align-items: center;
	justify-content: center;
	font-family: 'Segoe UI', sans-serif;
}

.login-card {
	background: white;
	border-radius: 15px;
	padding: 30px;
	width: 350px;
	box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.2);
	animation: fadeIn 0.8s ease-in-out;
}

.login-title {
	text-align: center;
	font-weight: bold;
	margin-bottom: 20px;
}

.btn-primary {
	border-radius: 10px;
}

.form-control {
	border-radius: 10px;
}

@keyframes fadeIn {from { opacity:0;
	transform: translateY(20px);
}

to {
	opacity: 1;
	transform: translateY(0);
}

}
.footer {
	text-align: center;
	margin-top: 15px;
	font-size: 12px;
	color: #777;
}
</style>
</head>

<body>

	<div class="login-card">

		<h3 class="login-title">⚽ Mundial HUB</h3>

		<form method="POST" action="/login">

			<input type="text" name="username" placeholder="Usuario"
				class="form-control mb-3" required> <input type="password"
				name="password" placeholder="Contraseña" class="form-control mb-3"
				required>

			<button class="btn btn-primary w-100">Ingresar</button>

		</form>

		<!-- ERROR -->
		<script>
			if (window.location.search.includes("error")) {
				const div = document.createElement("div");
				div.className = "alert alert-danger mt-3 text-center";
				div.innerText = "Usuario o contraseña incorrectos";
				document.querySelector(".login-card").appendChild(div);
			}
		</script>

		<div class="footer">Sistema de gestión de eventos ⚽</div>
		<p>
			No tienes cuenta? <a href="/registro.html">Regístrate</a>
		</p>
	</div>

</body>
</html>
