<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard - Mundial HUB</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">

<style>
body {
	display: flex;
	min-height: 100vh;
	font-family: 'Segoe UI', sans-serif;
}

/* SIDEBAR */
.sidebar {
	width: 230px;
	background: linear-gradient(180deg, #0d6efd, #0b5ed7);
	color: white;
	padding: 20px;
}

.sidebar h4 {
	text-align: center;
	margin-bottom: 30px;
}

.sidebar a {
	display: block;
	color: white;
	text-decoration: none;
	padding: 12px;
	border-radius: 10px;
	margin-bottom: 10px;
	transition: 0.2s;
}

.sidebar a:hover {
	background: rgba(255, 255, 255, 0.2);
}

/* CONTENT */
.content {
	flex: 1;
	padding: 25px;
	background: #f4f6f9;
}

.card {
	border-radius: 15px;
	transition: 0.2s;
}

.card:hover {
	transform: scale(1.03);
}
</style>

</head>
<body>

	<!-- SIDEBAR -->
	<div class="sidebar">
		<h4>⚽ HUB</h4>

		<a href="/usuarios.html" class="btn btn-dark">Usuarios</a> <a
			href="/entradas.html" class="btn btn-primary">Entradas</a> <a
			href="/eventos.html" class="btn btn-success">Eventos</a> <a
			href="/notificaciones.html" class="btn btn-warning">Notificaciones</a>
		<hr>

		<a href="/logout">🚪 Logout</a>
	</div>

	<!-- CONTENT -->
	<div class="content">

		<h2>Dashboard</h2>

		<!-- USUARIO -->
		<p id="usuarioInfo" class="text-muted mb-4"></p>

		<!-- CARDS -->
		<div class="row">

			<div class="col-md-4">
				<div class="card p-3 shadow">
					<h5>Total Entradas</h5>
					<h3 id="totalEntradas">0</h3>
				</div>
			</div>

			<div class="col-md-4">
				<div class="card p-3 shadow">
					<h5>Disponibles</h5>
					<h3 id="disponibles">0</h3>
				</div>
			</div>

			<div class="col-md-4">
				<div class="card p-3 shadow">
					<h5>Pagadas</h5>
					<h3 id="pagadas">0</h3>
				</div>
			</div>

		</div>

	</div>

	<script>


fetch("/api/entradas")
.then(res => res.json())
.then(data => {

    document.getElementById("totalEntradas").innerText = data.length;

    let disp = 0;
    let pag = 0;

    data.forEach(e => {
        if(e.estado === "DISPONIBLE") disp++;
        if(e.estado === "PAGADA") pag++;
    });

    document.getElementById("disponibles").innerText = disp;
    document.getElementById("pagadas").innerText = pag;
});

fetch("/api/eventos")
.then(res => {
    if(res.status === 403){
        document.getElementById("menuEventos").style.display = "none";
    }
});

fetch("/api/usuarios")
.then(res => {
    if(res.status === 403){
        document.getElementById("menuUsuarios").style.display = "none";
    }
});

fetch("/user")
.then(res => res.json())
.then(user => {
    document.getElementById("usuarioInfo").innerText =
        "👤 " + user.name + " | Rol: " + user.authorities[0].authority;
});

</script>

</body>
</html>
