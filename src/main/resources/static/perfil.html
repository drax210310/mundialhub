<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mi Perfil - Mundial HUB</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
body {
	background: #f4f7fc;
	font-family: 'Segoe UI', sans-serif;
}

.navbar-custom {
	background: linear-gradient(90deg, #0d6efd, #6610f2);
}

.navbar-brand {
	font-weight: bold;
	color: white !important;
}

.card {
	border: none;
	border-radius: 18px;
	box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
}

.profile-header {
	background: linear-gradient(135deg, #0d6efd, #6610f2);
	color: white;
	border-radius: 18px 18px 0 0;
	padding: 30px;
	text-align: center;
}

.profile-icon {
	font-size: 80px;
	margin-bottom: 10px;
}

.btn-custom {
	border-radius: 10px;
}
</style>
</head>

<body>

	<nav class="navbar navbar-expand-lg navbar-custom mb-4">
		<div class="container">
			<a class="navbar-brand" href="/dashboard-usuario.html"><i
				class="fa fa-arrow-left"></i> Volver al Inicio</a>
			<div class="d-flex">
				<a href="/logout" class="btn btn-danger btn-custom"><i
					class="fa fa-right-from-bracket"></i> Cerrar sesión</a>
			</div>
		</div>
	</nav>

	<div class="container">
		<div class="row justify-content-center">
			<div class="col-md-8">
				<div class="card">
					<div class="profile-header">
						<i class="fa fa-user-circle profile-icon"></i>
						<h2 id="displayNombre">Cargando...</h2>
						<p class="mb-0" id="displayUsername">@usuario</p>
					</div>
					<div class="card-body p-4">
						<h4 class="mb-4">Información Personal y Preferencias</h4>

						<form id="perfilForm">
							<div class="row">
								<div class="col-md-6 mb-3">
									<label class="form-label fw-bold">Nombre Completo</label> <input
										type="text" class="form-control" id="nombreInput" required>
								</div>
								<div class="col-md-6 mb-3">
									<label class="form-label fw-bold">Correo Electrónico</label> <input
										type="email" class="form-control" id="emailInput" required>
								</div>
							</div>

							<hr class="my-4">
							<h5 class="mb-3">
								<i class="fa fa-star text-warning"></i> Configura tus Favoritos
							</h5>

							<div class="row">
								<div class="col-md-6 mb-3">
									<label class="form-label fw-bold">Selección Favorita</label> <select
										class="form-select" id="equipoInput">
										<option value="">Ninguna</option>
										<option value="Argentina">Argentina</option>
										<option value="Brasil">Brasil</option>
										<option value="Colombia">Colombia</option>
										<option value="España">España</option>
										<option value="Francia">Francia</option>
										<option value="México">México</option>
									</select>
								</div>
								<div class="col-md-6 mb-3">
									<label class="form-label fw-bold">Sede de Interés
										(Ciudad/Estadio)</label> <select class="form-select" id="sedeInput">
										<option value="">Ninguna</option>
										<option value="Ciudad de México (Estadio Azteca)">Ciudad
											de México (Azteca)</option>
										<option value="Nueva York (MetLife Stadium)">Nueva
											York (MetLife Stadium)</option>
										<option value="Los Ángeles (SoFi Stadium)">Los
											Ángeles (SoFi Stadium)</option>
										<option value="Miami (Hard Rock Stadium)">Miami (Hard
											Rock Stadium)</option>
										<option value="Toronto (BMO Field)">Toronto (BMO
											Field)</option>
									</select>
								</div>
							</div>

							<div class="text-end mt-4">
								<button type="button"
									class="btn btn-primary btn-lg px-5 btn-custom"
									onclick="guardarPerfil()">
									<i class="fa fa-save"></i> Guardar Cambios
								</button>
							</div>
						</form>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script>
        // ==========================================
        // CARGAR DATOS AL INICIAR
        // ==========================================
        function cargarPerfil() {
            fetch("/api/perfil")
                .then(function(response) {
                    if (response.ok) {
                        return response.json();
                    } else {
                        throw new Error("Error en servidor: Status " + response.status);
                    }
                })
                .then(function(usuario) {
                    // Inyectar datos en la interfaz
                    document.getElementById("displayNombre").innerText = usuario.nombre || "Usuario";
                    document.getElementById("displayUsername").innerText = "@" + (usuario.username || "username");
                    
                    if (document.getElementById("nombreInput")) document.getElementById("nombreInput").value = usuario.nombre || "";
                    if (document.getElementById("emailInput")) document.getElementById("emailInput").value = usuario.email || "";
                    if (document.getElementById("equipoInput")) document.getElementById("equipoInput").value = usuario.equipoFavorito || "";
                    if (document.getElementById("sedeInput")) document.getElementById("sedeInput").value = usuario.sedeFavorita || "";
                })
                .catch(function(error) {
                    console.error("Error atrapado en cargarPerfil:", error);
                    document.getElementById("displayNombre").innerText = "Error al cargar";
                });
        }

        // ==========================================
        // GUARDAR CAMBIOS
        // ==========================================
        function guardarPerfil() {
            var nombreEl = document.getElementById("nombreInput");
            var emailEl = document.getElementById("emailInput");
            var equipoEl = document.getElementById("equipoInput");
            var sedeEl = document.getElementById("sedeInput");

            if (!nombreEl || !emailEl || !equipoEl || !sedeEl) {
                alert("❌ Error: Campos de texto no encontrados en el HTML.");
                return;
            }

            var data = {
                nombre: nombreEl.value,
                email: emailEl.value,
                equipoFavorito: equipoEl.value,
                sedeFavorita: sedeEl.value
            };

            console.log("Enviando datos al backend de forma compatible:", data);

            fetch("/api/perfil", {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            })
            .then(function(response) {
                if (response.ok) {
                    alert("✅ Perfil y preferencias actualizadas correctamente");
                    cargarPerfil(); // Refrescar los textos de arriba
                } else {
                    return response.text().then(function(detalleError) {
                        alert("❌ Servidor rechazó la actualización.\nCódigo: " + response.status + "\nDetalle: " + detalleError);
                    });
                }
            })
            .catch(function(error) {
                console.error("Error crítico en guardarPerfil:", error);
                alert("❌ Excepción de red o JS: " + error.message);
            });
        }

        // Ejecutar carga inicial automáticamente
        cargarPerfil();
    </script>
</body>
</html>
