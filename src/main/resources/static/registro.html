<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Registro - Mundial HUB</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
body {
	background: linear-gradient(135deg, #0d6efd, #6610f2);
	height: 100vh;
	display: flex;
	align-items: center;
	justify-content: center;
	font-family: 'Segoe UI', sans-serif;
}

.register-card {
	background: white;
	border-radius: 20px;
	padding: 40px;
	width: 100%;
	max-width: 450px;
	box-shadow: 0px 15px 35px rgba(0, 0, 0, 0.3);
	animation: fadeIn 0.6s ease-out;
}

@keyframes fadeIn {from { opacity:0;
	transform: translateY(-20px);
}

to {
	opacity: 1;
	transform: translateY(0);
}

}
.form-control {
	border-radius: 10px;
	padding: 12px;
}

.btn-custom {
	border-radius: 10px;
	font-weight: bold;
	padding: 12px;
}

.back-link {
	color: #6c757d;
	text-decoration: none;
	font-size: 0.9rem;
}

.back-link:hover {
	color: #0d6efd;
}
</style>
</head>
<body>

	<div class="register-card">
		<div class="text-center mb-4">
			<h3 class="fw-bold text-primary">
				<i class="fa fa-user-plus"></i> Crear Cuenta
			</h3>
			<p class="text-muted small">Únete a la plataforma oficial del
				Mundial 2026</p>
		</div>

		<div id="alertaError" class="alert alert-danger d-none"></div>

		<form id="registroForm">
			<div class="mb-3">
				<input type="text" id="nombre" class="form-control"
					placeholder="Nombre completo" required minlength="3">
			</div>
			<div class="mb-3">
				<input type="email" id="email" class="form-control"
					placeholder="Correo electrónico" required>
			</div>
			<div class="mb-3">
				<input type="text" id="username" class="form-control"
					placeholder="Nombre de usuario (@username)" required minlength="4"
					pattern="^\S+$" title="No se permiten espacios">
			</div>
			<div class="mb-4">
				<input type="password" id="password" class="form-control"
					placeholder="Contraseña (mínimo 6 caracteres)" required
					minlength="6">
			</div>

			<button type="submit" class="btn btn-primary w-100 btn-custom"
				id="btnRegistro">Registrarme</button>
		</form>

		<div class="text-center mt-4">
			<p class="mb-1 text-muted small">¿Ya tienes una cuenta?</p>
			<a href="/login.html" class="fw-bold text-decoration-none">Iniciar
				Sesión</a>
		</div>
		<div class="text-center mt-3">
			<a href="/index.html" class="back-link"><i
				class="fa fa-arrow-left"></i> Volver al inicio</a>
		</div>
	</div>

	<script>
        document.getElementById("registroForm").addEventListener("submit", function(event) {
            event.preventDefault();

            var nombre = document.getElementById("nombre").value;
            var email = document.getElementById("email").value;
            var username = document.getElementById("username").value;
            var password = document.getElementById("password").value;
            var alerta = document.getElementById("alertaError");

            var btn = document.getElementById("btnRegistro");
            btn.innerHTML = "<i class='fa fa-spinner fa-spin'></i> Procesando...";
            btn.disabled = true;

            fetch('/api/usuarios/registro', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    nombre: nombre,
                    email: email,
                    username: username,
                    password: password
                })
            })
            .then(function(res) {
                if(res.ok) {
                    alert("✅ Usuario registrado correctamente. Ya puedes iniciar sesión.");
                    window.location.href = "/login.html";
                } else {
                    return res.text().then(function(mensajeError) {
                        alerta.innerText = "Error: " + mensajeError;
                        alerta.classList.remove("d-none");
                        btn.innerHTML = "Registrarme";
                        btn.disabled = false;
                    });
                }
            })
            .catch(function(err) {
                alerta.innerText = "Error de conexión con el servidor.";
                alerta.classList.remove("d-none");
                btn.innerHTML = "Registrarme";
                btn.disabled = false;
                console.error(err);
            });
        });
    </script>
</body>
</html>
